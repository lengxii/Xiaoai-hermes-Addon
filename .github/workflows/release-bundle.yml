name: Manual Release Bundle

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify publishable package
        run: npm pack --dry-run

      - name: Create release bundle
        run: |
          set -eu

          bundle_root="release-bundle/openclaw-plugin-xiaoai-cloud"

          rm -rf release-bundle
          rm -f openclaw-plugin-xiaoai-cloud-bundle.tar.gz openclaw-plugin-xiaoai-cloud-bundle.zip release-assets.sha256

          mkdir -p "$bundle_root/scripts"

          cp -R dist "$bundle_root/"
          cp -R assets "$bundle_root/"
          cp scripts/configure-openclaw-install.mjs "$bundle_root/scripts/"
          cp package.json package-lock.json openclaw.plugin.json install.sh install.cmd "$bundle_root/"

          test ! -e "$bundle_root/README.md"
          test ! -e "$bundle_root/PROJECT_ANALYSIS.md"
          test ! -e "$bundle_root/CROSS_CLAW_ADAPTATION_PLAN.md"

          chmod +x "$bundle_root/install.sh"

          tar -czf openclaw-plugin-xiaoai-cloud-bundle.tar.gz -C release-bundle openclaw-plugin-xiaoai-cloud
          python3 - <<'PY'
          import pathlib
          import zipfile

          root = pathlib.Path("release-bundle")
          source_dir = root / "openclaw-plugin-xiaoai-cloud"
          output = pathlib.Path("openclaw-plugin-xiaoai-cloud-bundle.zip")

          with zipfile.ZipFile(output, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(source_dir.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(root))
          PY

          sha256sum \
            openclaw-plugin-xiaoai-cloud-bundle.tar.gz \
            openclaw-plugin-xiaoai-cloud-bundle.zip \
            install.sh \
            install.cmd \
            > release-assets.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: openclaw-plugin-xiaoai-cloud-release-bundle
          path: |
            openclaw-plugin-xiaoai-cloud-bundle.tar.gz
            openclaw-plugin-xiaoai-cloud-bundle.zip
            install.sh
            install.cmd
            release-assets.sha256
          if-no-files-found: error

  smoke-test-bundle:
    runs-on: ubuntu-latest
    needs: bundle

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: openclaw-plugin-xiaoai-cloud-release-bundle
          path: .

      - name: Extract and verify bundle contents
        run: |
          set -eu

          rm -rf smoke-test
          mkdir -p smoke-test/tar smoke-test/zip

          tar -xzf openclaw-plugin-xiaoai-cloud-bundle.tar.gz -C smoke-test/tar
          python3 - <<'PY'
          import pathlib
          import zipfile

          output_dir = pathlib.Path("smoke-test/zip")
          with zipfile.ZipFile("openclaw-plugin-xiaoai-cloud-bundle.zip") as zf:
              zf.extractall(output_dir)
          PY

          for root in \
            smoke-test/tar/openclaw-plugin-xiaoai-cloud \
            smoke-test/zip/openclaw-plugin-xiaoai-cloud
          do
            test -f "$root/install.sh"
            test -f "$root/install.cmd"
            test -f "$root/openclaw.plugin.json"
            test -f "$root/package.json"
            test -f "$root/package-lock.json"
            test -f "$root/dist/index.js"
            test -f "$root/dist/src/provider.js"
            test -f "$root/assets/ui/xiaoai-console.css"
            test -f "$root/assets/ui/xiaoai-console.js"
            test -f "$root/assets/ui/favicon.svg"
            test -f "$root/assets/fonts/manrope/wght.css"
            test -f "$root/assets/fonts/noto-sans-sc/wght.css"
            test -f "$root/scripts/configure-openclaw-install.mjs"
            test ! -e "$root/README.md"
            test ! -e "$root/PROJECT_ANALYSIS.md"
            test ! -e "$root/CROSS_CLAW_ADAPTATION_PLAN.md"
          done

      - name: Smoke test extracted install helpers
        run: |
          set -eu

          for root in \
            smoke-test/tar/openclaw-plugin-xiaoai-cloud \
            smoke-test/zip/openclaw-plugin-xiaoai-cloud
          do
            sh -n "$root/install.sh"
            sh "$root/install.sh" --help >/dev/null
            node "$root/scripts/configure-openclaw-install.mjs" --help >/dev/null
          done

  create-release:
    runs-on: ubuntu-latest
    needs: smoke-test-bundle

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: openclaw-plugin-xiaoai-cloud-release-bundle
          path: .

      - name: Generate release metadata
        id: meta
        run: |
          set -eu

          version=$(python3 - <<'PY'
          import json
          from pathlib import Path

          package = json.loads(Path("package.json").read_text(encoding="utf-8"))
          print(package["version"])
          PY
          )
          stamp=$(date -u +"%Y%m%d-%H%M%S")
          tag="v${version}-${stamp}-r${GITHUB_RUN_NUMBER}"
          title="v${version} ${stamp} UTC"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
        run: |
          gh release create "$RELEASE_TAG" \
            openclaw-plugin-xiaoai-cloud-bundle.tar.gz \
            openclaw-plugin-xiaoai-cloud-bundle.zip \
            install.sh \
            install.cmd \
            release-assets.sha256 \
            --title "$RELEASE_TITLE" \
            --target "$GITHUB_SHA" \
            --generate-notes
